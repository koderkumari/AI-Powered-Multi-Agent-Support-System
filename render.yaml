services:
  - type: web
    name: ai-support-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend/frontend && npm install && npm run build
    startCommand: cd frontend/frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-support-backend.onrender.com

  - type: web
    name: ai-support-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend/backend && npm install && npm run build
    startCommand: cd frontend/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
